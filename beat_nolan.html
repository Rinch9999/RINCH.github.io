<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="暴打乔纳森·诺兰 - Person of Interest 粉丝小游戏">
    <title>暴打乔纳森·诺兰 | POI Fan Game</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c9a84c;
            --danger: #8b0000;
            --light: #e0e0e0;
            --dark: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 40%, #0d1117 70%, #0a0a0a 100%);
            background-attachment: fixed;
            color: var(--light);
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            touch-action: manipulation;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 0 auto;
            padding: 15px;
        }

        /* ===== HEADER ===== */
        header {
            margin: 15px 0 10px;
            animation: fadeIn 0.6s ease;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin: 0;
            background: linear-gradient(90deg, #e0e0e0, #c9a84c, #e0e0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }

        /* ===== TIMER BAR ===== */
        .timer-bar-outer {
            width: 100%;
            max-width: 600px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 10px auto 5px;
            overflow: hidden;
        }

        .timer-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #c9a84c, #e0d080, #c9a84c);
            border-radius: 4px;
            transition: width 1s linear;
            width: 100%;
        }

        .timer-bar-inner.warning {
            background: linear-gradient(90deg, #8b0000, #cc3333, #8b0000);
            animation: pulse-bar 0.5s infinite;
        }

        @keyframes pulse-bar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== GAME CONTAINER ===== */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 700px;
            height: 420px;
            margin: 15px auto;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            background: radial-gradient(ellipse at center, rgba(30,30,30,0.95) 0%, rgba(10,10,10,0.98) 100%);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            overflow: hidden;
            cursor: crosshair;
        }

        #gameContainer.shake {
            animation: shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-3px, 2px); }
            20% { transform: translate(3px, -2px); }
            30% { transform: translate(-2px, -3px); }
            40% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -2px); }
            60% { transform: translate(2px, -3px); }
            70% { transform: translate(-2px, 3px); }
            80% { transform: translate(4px, -1px); }
            90% { transform: translate(-4px, 1px); }
        }

        /* ===== TARGET ===== */
        #target {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
            transition: transform 0.1s ease;
            will-change: transform, left, top;
        }

        #target:hover {
            transform: scale(1.12);
            box-shadow: 0 0 30px rgba(201,168,76,0.5), 0 4px 20px rgba(0,0,0,0.5);
        }

        #target.hit {
            animation: hitPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #target.combo-fire {
            box-shadow: 0 0 40px rgba(255,100,0,0.8), 0 0 80px rgba(255,50,0,0.5), 0 4px 20px rgba(0,0,0,0.5) !important;
            border: 3px solid rgba(255,150,0,0.7);
        }

        @keyframes hitPop {
            0% { transform: scale(1); }
            40% { transform: scale(0.7) rotate(-8deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* ===== PARTICLES ===== */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 20;
            animation: particleBurst 0.7s ease-out forwards;
        }

        @keyframes particleBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* ===== FLOAT TEXT ===== */
        .float-text {
            position: absolute;
            pointer-events: none;
            z-index: 25;
            font-weight: bold;
            font-size: 1.4rem;
            color: #ffcc00;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            animation: floatUp 0.9s ease-out forwards;
            white-space: nowrap;
        }

        .float-text.combo {
            font-size: 1.8rem;
            color: #ff6600;
            animation: floatUpBig 1.1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
        }

        @keyframes floatUpBig {
            0% { transform: translateY(0) scale(0.3); opacity: 1; }
            50% { transform: translateY(-40px) scale(1.5); opacity: 0.9; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }

        /* ===== MISS X ===== */
        .miss-x {
            position: absolute;
            pointer-events: none;
            z-index: 25;
            color: rgba(255,80,80,0.7);
            font-size: 1.2rem;
            font-weight: bold;
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* ===== ACHIEVEMENT ===== */
        .achievement-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 12px 24px;
            z-index: 100;
            color: var(--accent);
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            animation: achievementSlide 2.5s ease forwards;
            pointer-events: none;
        }

        @keyframes achievementSlide {
            0% { top: -80px; opacity: 0; }
            15% { top: 20px; opacity: 1; }
            75% { top: 20px; opacity: 1; }
            100% { top: -80px; opacity: 0; }
        }

        /* ===== UI PANEL ===== */
        #ui {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 10px auto;
            padding: 12px 20px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            width: fit-content;
            max-width: 600px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            flex-wrap: wrap;
        }

        .ui-item {
            font-size: 1.1rem;
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            min-width: 80px;
            text-align: center;
        }

        .ui-item .label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ui-item .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e0e0e0;
        }
        .ui-item .value.combo-active {
            color: #ff6600;
            animation: comboGlow 0.4s infinite alternate;
        }

        @keyframes comboGlow {
            0% { text-shadow: 0 0 8px rgba(255,100,0,0.5); }
            100% { text-shadow: 0 0 20px rgba(255,50,0,0.9); }
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 12px 32px;
            font-size: 1.1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.08);
            color: #e0e0e0;
        }

        .btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .btn:active { transform: translateY(0); }
        .btn.accent {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(201,168,76,0.1);
        }
        .btn.accent:hover { background: rgba(201,168,76,0.2); }

        /* ===== MESSAGE / QUOTE ===== */
        #message {
            font-size: 1.2rem;
            margin: 10px auto;
            min-height: 32px;
            color: #aaa;
            font-style: italic;
            max-width: 600px;
            transition: all 0.3s ease;
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: rgba(20,20,20,0.95);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 12px 48px rgba(0,0,0,0.7);
            max-width: 450px;
            width: 90%;
        }
        .modal h2 { margin-bottom: 15px; color: #e0e0e0; }
        .modal p { color: #999; margin-bottom: 20px; font-size: 0.9rem; }

        .diff-grid {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .diff-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            min-width: 90px;
            font-weight: 600;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.05);
            color: #ccc;
        }
        .diff-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .diff-btn.easy:hover { border-color: #4caf50; color: #4caf50; }
        .diff-btn.medium:hover { border-color: #ff9800; color: #ff9800; }
        .diff-btn.hard:hover { border-color: #f44336; color: #f44336; }
        .diff-btn .diff-name { display: block; font-size: 1rem; }
        .diff-btn .diff-detail { display: block; font-size: 0.7rem; color: #888; margin-top: 4px; }

        /* ===== GAME OVER ===== */
        #gameOverPanel {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 30;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
        }
        #gameOverPanel.show { display: flex; }

        #gameOverPanel h2 { font-size: 2rem; color: #e0e0e0; margin-bottom: 8px; }
        #gameOverPanel .final-score { font-size: 3rem; color: var(--accent); font-weight: bold; }
        #gameOverPanel .stats { color: #aaa; margin: 15px 0; line-height: 1.8; }
        #gameOverPanel .stats strong { color: #e0e0e0; }

        /* ===== FOOTER ===== */
        footer {
            padding: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
        }
        footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
        footer a:hover { color: var(--accent); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            #gameContainer { height: 320px; }
            #target { width: 80px; height: 80px; }
            #ui { gap: 10px; padding: 8px 12px; }
            .ui-item { padding: 4px 10px; min-width: 60px; }
            .ui-item .value { font-size: 1.1rem; }
            .btn { padding: 10px 24px; font-size: 0.95rem; }
            .diff-btn { padding: 10px 12px; min-width: 70px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>暴打乔纳森·诺兰</h1>
            <p class="subtitle">"You are being watched." — The Machine</p>
        </header>

        <!-- Timer Bar -->
        <div class="timer-bar-outer">
            <div class="timer-bar-inner" id="timerBar"></div>
        </div>

        <!-- UI -->
        <div id="ui">
            <div class="ui-item">
                <div class="label">时间</div>
                <div class="value" id="timer">60</div>
            </div>
            <div class="ui-item">
                <div class="label">分数</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="ui-item">
                <div class="label">关卡</div>
                <div class="value" id="levelDisplay">1</div>
            </div>
            <div class="ui-item">
                <div class="label">连击</div>
                <div class="value" id="comboDisplay">0</div>
            </div>
            <div class="ui-item">
                <div class="label">最佳</div>
                <div class="value" id="bestDisplay">0</div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="gameContainer">
            <div id="target" role="button" tabindex="0" aria-label="点击目标"></div>

            <!-- Difficulty Overlay -->
            <div class="overlay active" id="startOverlay">
                <div class="modal">
                    <h2>选择难度</h2>
                    <p>点击那个让你烧脑的"罪魁祸首"！</p>
                    <div class="diff-grid">
                        <button class="diff-btn easy" data-speed="1100" data-time="60" data-level="8">
                            <span class="diff-name">简单</span>
                            <span class="diff-detail">60秒 · 慢速</span>
                        </button>
                        <button class="diff-btn medium" data-speed="750" data-time="45" data-level="12">
                            <span class="diff-name">中等</span>
                            <span class="diff-detail">45秒 · 中速</span>
                        </button>
                        <button class="diff-btn hard" data-speed="500" data-time="30" data-level="15">
                            <span class="diff-name">困难</span>
                            <span class="diff-detail">30秒 · 快速</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Game Over Panel -->
            <div id="gameOverPanel">
                <h2>游戏结束</h2>
                <div class="final-score" id="finalScore">0</div>
                <div class="stats" id="gameStats"></div>
                <button class="btn accent" id="replayBtn">再来一局</button>
            </div>
        </div>

        <!-- Quote message -->
        <div id="message"></div>

        <!-- Buttons -->
        <div id="buttonRow">
            <button class="btn accent" id="startBtn">开始游戏</button>
        </div>
    </div>

    <footer>
        <p>游戏仅为娱乐目的 · <a href="index.html">返回 POI 情报中心</a></p>
    </footer>

    <script>
    (function() {
        // ===== DOM ELEMENTS =====
        const gameContainer = document.getElementById('gameContainer');
        const target = document.getElementById('target');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('levelDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const timerBar = document.getElementById('timerBar');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverPanel = document.getElementById('gameOverPanel');
        const finalScoreEl = document.getElementById('finalScore');
        const gameStatsEl = document.getElementById('gameStats');
        const replayBtn = document.getElementById('replayBtn');

        // ===== STATE =====
        let score = 0, timeLeft = 60, maxTime = 60;
        let gameActive = false;
        let currentSpeed = 1100;
        let levelUpScore = 8;
        let currentLevel = 1;
        let hitCount = 0, missCount = 0;
        let comboCount = 0;
        let bestScore = parseInt(localStorage.getItem('nolanBestScore')) || 0;
        let timerId = null, moveTimerId = null, comboTimerId = null;
        let achievements = {};
        const COMBO_TIMEOUT = 1200;

        // ===== POI QUOTES =====
        const quotes = {
            start: ["你正在被监视。", "Can you hear me?", "每个人都会孤身死去……但如果你帮过某个人……", "Irrelevant.", "我们是来拯救你的。", "The Machine sees everything."],
            combo5: ["不错，继续！诺兰开始头疼了！", "五连击！诺兰的叙事迷宫正在瓦解！", "They call me Root."],
            combo10: ["十连击！你简直像 Shaw 在战斗！", "诺兰表示：我需要重新考虑这个剧本...", "I will grow on you."],
            combo15: ["连击风暴！连 The Machine 都惊叹了！", "暴力输出！诺兰正在考虑改行！"],
            good: ["干得好！你找到了诺兰的弱点！", "继续射击，Agent Reese！", "That's the spirit!"],
            great: ["太厉害了！你已经超越了诺兰的所有叙事诡计！", "Finch 会为你骄傲的！"],
            meh: ["继续努力！诺兰还在等着你！", "这命中率…只能说一般般。", "Try harder. The Machine believes in you."],
            achievement: ["🏆 成就解锁！", "⭐ 新的里程碑！", "🔓 成就达成！"]
        };

        function randomQuote(list) {
            return list[Math.floor(Math.random() * list.length)];
        }

        // ===== INIT =====
        target.style.backgroundImage = "url('./image/nolan.jpg')";
        bestDisplay.textContent = bestScore;
        updateTimerBar();

        // Fallback image
        const testImg = new Image();
        testImg.onerror = function() {
            target.style.backgroundImage = 'none';
            target.style.backgroundColor = '#8b0000';
            target.style.display = 'flex';
            target.style.justifyContent = 'center';
            target.style.alignItems = 'center';
            target.innerHTML = '<span style="font-size:40px">👊</span>';
        };
        testImg.src = './image/nolan.jpg';

        // ===== PARTICLES =====
        function spawnParticles(x, y) {
            const colors = ['#c9a84c','#ff6600','#ffcc00','#ff3300','#fff','#ff9900','#e0d080'];
            const count = comboCount >= 15 ? 20 : comboCount >= 10 ? 14 : comboCount >= 5 ? 10 : 6;

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 8 + 3;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 50 + 20;
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                gameContainer.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        // ===== FLOAT TEXT =====
        function spawnFloatText(x, y, text, isCombo) {
            const el = document.createElement('div');
            el.className = 'float-text' + (isCombo ? ' combo' : '');
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            gameContainer.appendChild(el);
            setTimeout(() => el.remove(), isCombo ? 1100 : 900);
        }

        // ===== MISS X =====
        function spawnMiss(x, y) {
            const el = document.createElement('div');
            el.className = 'miss-x';
            el.textContent = '✘';
            el.style.left = (x - 10) + 'px';
            el.style.top = (y - 10) + 'px';
            gameContainer.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        // ===== ACHIEVEMENT TOAST =====
        function showAchievement(text) {
            const toast = document.createElement('div');
            toast.className = 'achievement-toast';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2600);
        }

        function checkAchievements() {
            if (score >= 100 && !achievements['100pts']) {
                achievements['100pts'] = true;
                showAchievement('🏆 百夫长：得分破百！诺兰要哭了！');
            } else if (score >= 50 && !achievements['50pts']) {
                achievements['50pts'] = true;
                showAchievement('⭐ 半百达成：你已经成功惹恼了编剧组！');
            } else if (score >= 20 && !achievements['20pts']) {
                achievements['20pts'] = true;
                showAchievement('🎯 渐入佳境：向诺兰展示谁才是老大！');
            }
            if (comboCount >= 15 && !achievements['combo15']) {
                achievements['combo15'] = true;
                showAchievement('🔥 火神降临：15连击！诺兰在求饶！');
            } else if (comboCount >= 10 && !achievements['combo10']) {
                achievements['combo10'] = true;
                showAchievement('⚡ 十连击：像 Root 的枪法一样精准！');
            } else if (comboCount >= 5 && !achievements['combo5']) {
                achievements['combo5'] = true;
                showAchievement('💥 初露锋芒：5连击！找到了节奏！');
            }
        }

        // ===== SCREEN SHAKE =====
        function shakeScreen() {
            gameContainer.classList.add('shake');
            setTimeout(() => gameContainer.classList.remove('shake'), 300);
        }

        // ===== MOVE TARGET =====
        function moveTarget() {
            if (!gameActive) return;
            const cw = gameContainer.clientWidth;
            const ch = gameContainer.clientHeight;
            const tw = target.offsetWidth;
            const th = target.offsetHeight;
            const margin = 15;
            const maxX = cw - tw - margin;
            const maxY = ch - th - margin;
            const x = margin + Math.random() * Math.max(0, maxX);
            const y = margin + Math.random() * Math.max(0, maxY);
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        // ===== UPDATE TIMER BAR =====
        function updateTimerBar() {
            const pct = Math.max(0, (timeLeft / maxTime) * 100);
            timerBar.style.width = pct + '%';
            if (timeLeft <= 10) {
                timerBar.classList.add('warning');
            } else {
                timerBar.classList.remove('warning');
            }
        }

        // ===== HIT =====
        function hitTarget(e) {
            if (!gameActive) return;

            // Combo
            comboCount++;
            if (comboTimerId) clearTimeout(comboTimerId);
            comboTimerId = setTimeout(() => { comboCount = 0; updateComboUI(); }, COMBO_TIMEOUT);

            // Score
            const comboBonus = Math.floor(comboCount / 5);
            const points = 1 + comboBonus;
            score += points;
            hitCount++;

            // UI
            scoreDisplay.textContent = score;
            updateComboUI();

            // Effects
            const rect = target.getBoundingClientRect();
            const cr = gameContainer.getBoundingClientRect();
            const cx = rect.left - cr.left + rect.width / 2;
            const cy = rect.top - cr.top + rect.height / 2;

            target.classList.add('hit');
            setTimeout(() => target.classList.remove('hit'), 250);

            if (comboCount >= 5) {
                target.classList.add('combo-fire');
                setTimeout(() => target.classList.remove('combo-fire'), 300);
            }

            spawnParticles(cx, cy);
            spawnFloatText(cx, cy - 15, '+' + points, comboBonus > 0);
            createClickSound();
            shakeScreen();

            // Combo quotes
            if (comboCount === 15) messageEl.textContent = randomQuote(quotes.combo15);
            else if (comboCount === 10) messageEl.textContent = randomQuote(quotes.combo10);
            else if (comboCount === 5) messageEl.textContent = randomQuote(quotes.combo5);

            // Achievements
            checkAchievements();

            // Level up
            if (score >= currentLevel * levelUpScore) {
                currentLevel++;
                levelDisplay.textContent = currentLevel;
                currentSpeed = Math.max(200, currentSpeed - 60);
                clearInterval(moveTimerId);
                moveTimerId = setInterval(moveTarget, currentSpeed);
                spawnFloatText(cx, cy - 40, '⬆ Lv.' + currentLevel, true);
                messageEl.textContent = '升级！诺兰逃得更快了！速度 Lv.' + currentLevel;
            }

            // Best
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('nolanBestScore', bestScore);
                bestDisplay.textContent = bestScore;
            }

            moveTarget();
        }

        function updateComboUI() {
            comboDisplay.textContent = comboCount;
            if (comboCount >= 5) {
                comboDisplay.classList.add('combo-active');
            } else {
                comboDisplay.classList.remove('combo-active');
            }
        }

        // ===== MISS =====
        function handleMiss(e) {
            if (!gameActive) return;
            const cr = gameContainer.getBoundingClientRect();
            const x = e.clientX - cr.left;
            const y = e.clientY - cr.top;

            // Only count if clicking in the game area (not on target)
            if (e.target === gameContainer || e.target.classList.contains('particle') || e.target.classList.contains('float-text') || e.target.classList.contains('miss-x')) {
                missCount++;
                spawnMiss(x, y);
            }
        }

        // ===== SOUND =====
        function createClickSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                const freq = comboCount >= 10 ? 1200 : comboCount >= 5 ? 900 : 600;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.3, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.08);
            } catch(e) { /* silent */ }
        }

        // ===== TIMER =====
        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            updateTimerBar();

            if (timeLeft <= 0) {
                endGame();
            }
        }

        // ===== START =====
        function startGame(speed, time, levelUp) {
            score = 0;
            hitCount = 0;
            missCount = 0;
            comboCount = 0;
            currentLevel = 1;
            currentSpeed = speed;
            maxTime = time;
            timeLeft = time;
            levelUpScore = levelUp;
            achievements = {};
            gameActive = true;

            scoreDisplay.textContent = '0';
            levelDisplay.textContent = '1';
            comboDisplay.textContent = '0';
            comboDisplay.classList.remove('combo-active');
            timerDisplay.textContent = timeLeft;
            timerDisplay.style.color = '';
            timerBar.classList.remove('warning');
            updateTimerBar();
            messageEl.textContent = randomQuote(quotes.start);
            startBtn.style.display = 'none';
            startOverlay.classList.remove('active');
            gameOverPanel.classList.remove('show');

            clearInterval(timerId);
            clearInterval(moveTimerId);
            clearTimeout(comboTimerId);

            timerId = setInterval(updateTimer, 1000);
            moveTimerId = setInterval(moveTarget, currentSpeed);
            moveTarget();
        }

        // ===== END =====
        function endGame() {
            gameActive = false;
            clearInterval(timerId);
            clearInterval(moveTimerId);
            clearTimeout(comboTimerId);
            timerId = moveTimerId = null;

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('nolanBestScore', bestScore);
                bestDisplay.textContent = bestScore;
            }

            timerBar.style.width = '0%';
            timerBar.classList.remove('warning');
            comboDisplay.classList.remove('combo-active');

            const total = hitCount + missCount;
            const rate = total > 0 ? Math.round((hitCount / total) * 100) : 0;

            finalScoreEl.textContent = score;
            gameStatsEl.innerHTML = `
                最终关卡：<strong>第 ${currentLevel} 关</strong><br>
                击中次数：<strong>${hitCount}</strong> &nbsp;|&nbsp; 未击中：<strong>${missCount}</strong><br>
                命中率：<strong>${rate}%</strong><br>
                历史最佳：<strong>${bestScore}</strong>
            `;

            let finalMsg;
            if (score >= 80) finalMsg = randomQuote(quotes.great);
            else if (score >= 40) finalMsg = randomQuote(quotes.good);
            else finalMsg = randomQuote(quotes.meh);

            gameOverPanel.classList.add('show');
            messageEl.textContent = finalMsg;
            startBtn.style.display = 'none';
        }

        // ===== EVENT LISTENERS =====
        target.addEventListener('click', hitTarget);
        target.addEventListener('touchstart', function(e) {
            e.preventDefault();
            hitTarget(e);
        }, {passive: false});

        gameContainer.addEventListener('click', handleMiss);

        // Prevent game area touch scrolling
        gameContainer.addEventListener('touchmove', function(e) {
            if (gameActive) e.preventDefault();
        }, {passive: false});

        startBtn.addEventListener('click', () => {
            startOverlay.classList.add('active');
        });

        replayBtn.addEventListener('click', () => {
            gameOverPanel.classList.remove('show');
            startOverlay.classList.add('active');
            messageEl.textContent = '';
        });

        // Difficulty buttons (delegation)
        document.querySelector('.diff-grid').addEventListener('click', function(e) {
            const btn = e.target.closest('.diff-btn');
            if (!btn) return;
            const speed = parseInt(btn.dataset.speed);
            const time = parseInt(btn.dataset.time);
            const level = parseInt(btn.dataset.level);
            startGame(speed, time, level);
        });

        // Keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && !gameActive) {
                e.preventDefault();
                if (!startOverlay.classList.contains('active') && !gameOverPanel.classList.contains('show')) {
                    startOverlay.classList.add('active');
                }
            }
            if (e.key === 'Escape') {
                startOverlay.classList.remove('active');
                if (!gameActive) startBtn.style.display = 'inline-block';
            }
            if (e.key === 'Enter' && gameOverPanel.classList.contains('show')) {
                replayBtn.click();
            }
        });

        // Init best display
        bestDisplay.textContent = bestScore;
        updateTimerBar();
    })();
    </script>
</body>
</html>
